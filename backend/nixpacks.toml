# Railway builds this backend with Nixpacks, and the container starts clean.
# The /generate pipeline shells out to ffmpeg/ffprobe (strip audio, trim,
# concat, overlay narration), so ffmpeg MUST be installed at build time —
# installing it locally via winget does nothing for the deployed container.
#
# Install ffmpeg as a Nix package. The "..." token is a Nixpacks spread that
# expands to the auto-detected packages (Python, pip, etc.), so appending
# "ffmpeg" ADDS to that set instead of replacing it. The nixpkgs `ffmpeg`
# derivation provides both `ffmpeg` and `ffprobe`.
[phases.setup]
nixPkgs = ["...", "ffmpeg"]

# Pin the start command in-repo instead of relying on the Railway dashboard.
# Railway injects $PORT at runtime; bind 0.0.0.0 so the container is reachable.
[start]
cmd = "uvicorn main:app --host 0.0.0.0 --port $PORT"
